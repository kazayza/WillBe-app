name: willbee_app
description: "A new Flutter project for WillBee Nursery."
publish_to: 'none'
version: 1.0.7+8
#version: 1.0.5+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # المكتبات بتاعتنا
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.20.0
  timezone: ^0.10.1
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_launcher_icons: ^0.13.1
  package_info_plus: ^4.0.2
  url_launcher: ^6.2.1
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^19.5.0
  fl_chart: ^1.1.1
  shimmer: ^3.0.0
  share_plus: ^10.0.0
  pdf: ^3.10.0  
  printing: ^5.11.0
  path_provider: ^2.1.0
  dio: ^5.4.0
  open_filex: ^4.3.4
  permission_handler: ^11.3.0
  excel: ^4.0.0
  flutter_localizations:
    sdk: flutter
  
  
    

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
   - assets/images/
   - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"   # 👈 ده مسار صورتك
  min_sdk_android: 21
 